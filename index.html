<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arafat Supreme Terminal</title>
    <style>
        :root {
            --neon-green: #00ff88;
            --neon-blue: #00d4ff;
            --neon-red: #ff4d4d;
            --bg-dark: #06090f;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* Top Header */
        .header {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--neon-green);
            display: flex; justify-content: space-between; align-items: center;
        }

        .header h1 { color: var(--neon-green); font-size: 14px; margin: 0; letter-spacing: 1px; }

        /* Terminal Area */
        #terminal-frame {
            flex-grow: 1; border: none; width: 100%; background: #000;
        }

        /* Control Panel */
        .control-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 10px;
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; border-top: 1px solid rgba(0, 255, 136, 0.2);
        }

        .btn {
            background: rgba(0, 0, 0, 0.5);
            color: white; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 2px; border-radius: 8px;
            font-size: 10px; font-weight: bold; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }

        .btn:active { background: var(--neon-green); color: #000; transform: scale(0.95); }
        .btn-clr { border-color: var(--neon-green); color: var(--neon-green); }
        .btn-sys { border-color: var(--neon-blue); color: var(--neon-blue); }
        .btn-stop { border-color: var(--neon-red); color: var(--neon-red); }

        .btn-icon { font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ARAFAT PRO TERMINAL v2</h1>
        <div style="color: var(--neon-green); font-size: 10px;">● SERVER ACTIVE</div>
    </div>

    <iframe id="terminal-frame" src="/terminal/"></iframe>

    <div class="control-panel">
        <button class="btn btn-clr" onclick="sendCmd('clear\n')">
            <span class="btn-icon">🧹</span><span>All Clear</span>
        </button>
        
        <button class="btn btn-sys" onclick="sendCmd('neofetch\n')">
            <span class="btn-icon">💻</span><span>Neofetch</span>
        </button>

        <button class="btn" onclick="sendCmd('nano index.js\n')">
            <span class="btn-icon">📝</span><span>Edit JS</span>
        </button>

        <button class="btn" onclick="sendCmd('node index.js\n')">
            <span class="btn-icon">🚀</span><span>Run Bot</span>
        </button>

        <button class="btn" onclick="sendCmd('ls -la\n')">
            <span class="btn-icon">📂</span><span>Files</span>
        </button>

        <button class="btn" onclick="pasteText()">
            <span class="btn-icon">📋</span><span>Paste</span>
        </button>

        <button class="btn" onclick="sendCmd('cd ..\n')">
            <span class="btn-icon">🔙</span><span>Back</span>
        </button>

        <button class="btn btn-stop" onclick="sendCmd('\x03')">
            <span class="btn-icon">🛑</span><span>Stop</span>
        </button>
    </div>

    <script>
        // Railway-তে ttyd সাধারণত রুটে রান হয়, তাই iframe সোর্স সেট করা
        const iframe = document.getElementById('terminal-frame');
        
        function sendCmd(cmd) {
            // ttyd সেশনে কমান্ড পাঠানোর জন্য (এটি বেসিক সিমুলেশন)
            alert("Executing: " + cmd + "\n(Terminal-এ টাইপ হবে)");
        }

        async function pasteText() {
            try {
                const text = await navigator.clipboard.readText();
                alert("Clipboard Data: " + text);
            } catch (err) {
                alert("পাসওয়ার্ড বা টেক্সট পেস্ট করার জন্য ব্রাউজার পারমিশন দিন।");
            }
        }
    </script>
</body>
</html>
