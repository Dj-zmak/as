<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arafat Pro Termux</title>
    <style>
        :root {
            --neon: #00ff88;
            --bg: #000000;
            --panel: #111111;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            font-family: 'Courier New', monospace;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* Terminal Container */
        #terminal {
            flex-grow: 1;
            width: 100%;
            background: var(--bg);
        }

        /* Professional Mobile Toolbar */
        .toolbar {
            height: 60px;
            background: var(--panel);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 5px;
            border-top: 1px solid #333;
            gap: 4px;
        }

        .t-btn {
            background: #222;
            color: var(--neon);
            border: 1px solid #444;
            padding: 10px 2px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            flex: 1;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .t-btn:active {
            background: var(--neon);
            color: #000;
            transform: scale(0.95);
        }

        .btn-paste {
            border: 1px solid var(--neon);
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.3);
        }

        /* Hide ttyd default header elements if any */
        .ttyd-header { display: none !important; }
    </style>
</head>
<body>

    <div id="terminal"></div>

    <div class="toolbar">
        <button class="t-btn" onclick="sendChar('\x1b')">ESC</button>
        <button class="t-btn" onclick="sendCtrl('C')">CTRL+C</button>
        <button class="t-btn" onclick="sendChar('\t')">TAB</button>
        <button class="t-btn" onclick="sendChar('/')">/</button>
        <button class="t-btn" onclick="sendChar('-')">-</button>
        <button class="t-btn btn-paste" onclick="doPaste()">PASTE</button>
        <button class="t-btn" onclick="sendChar('\x1b[A')">UP</button>
    </div>

    <script src="client-bundle.js"></script>
    <script>
        // ttyd উইন্ডো অবজেক্ট থেকে টার্মিনাল কন্ট্রোল করা
        var term;
        
        // টার্মিনাল লোড হওয়ার জন্য অপেক্ষা
        window.onload = function() {
            // ttyd নিজে থেকেই #terminal বা বডিতে টার্মিনাল রেন্ডার করবে
            // আমরা শুধু শর্টকাট বাটনগুলোর লজিক সেট করবো
        };

        function sendChar(char) {
            // ttyd এর ইনপুট ইভেন্ট ট্রিগার করা
            const event = new CustomEvent('ttyd-input', { detail: char });
            window.dispatchEvent(event);
        }

        function sendCtrl(key) {
            const code = String.fromCharCode(key.charCodeAt(0) - 64);
            sendChar(code);
        }

        async function doPaste() {
            try {
                const text = await navigator.clipboard.readText();
                sendChar(text);
            } catch (err) {
                console.error('Paste failed: ', err);
                alert("Clipboard permission দিন!");
            }
        }
    </script>
</body>
</html>
