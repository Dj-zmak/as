<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arafat VPS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
        #terminal { flex: 1; padding: 10px; }
        .btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: #111; border-top: 1px solid #0f0; }
        button { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px 2px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        button:active { background: #0f0; color: #000; }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <div class="btns">
        <button onclick="send('clear\n')">🧹 CLEAR</button>
        <button onclick="send('neofetch\n')">💻 SYSTEM</button>
        <button onclick="send('ls\n')">📂 FILES</button>
        <button onclick="send('\x03')">🛑 STOP</button>
        <button onclick="send('nano index.js\n')">📝 EDIT</button>
        <button onclick="send('node index.js\n')">🚀 RUN</button>
        <button onclick="send('cd ..\n')">🔙 BACK</button>
        <button onclick="location.reload()">🔄 REFRESH</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const term = new Terminal({ cursorBlink: true, fontSize: 14, theme: { background: '#000' } });
        term.open(document.getElementById('terminal'));

        // ডাটা আদান-প্রদান
        term.onData(data => socket.emit('input', data));
        socket.on('output', data => term.write(data));

        function send(cmd) { socket.emit('input', cmd); }
    </script>
</body>
</html>
